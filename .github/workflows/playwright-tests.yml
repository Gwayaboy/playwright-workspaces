name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PLAYWRIGHT_SERVICE_URL: ${{ secrets.PLAYWRIGHT_SERVICE_URL }}

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: samples/playwright-tests/package-lock.json

    - name: Install dependencies
      working-directory: samples/playwright-tests
      run: npm ci

    - name: Azure Login with Managed Identity
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Run Playwright tests
      id: playwright-tests
      working-directory: samples/playwright-tests
      run: |
        npx playwright test --config=playwright.service.config.ts --workers=20 2>&1 | tee test-output.log
        REPORT_URL=$(grep -oP 'Published report URL: \K.*' test-output.log || echo "")
        if [ -n "$REPORT_URL" ]; then
          echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT
          echo "✅ Tests completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **View Test Results in Azure Portal:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[$REPORT_URL]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Display Report URL
      if: steps.playwright-tests.outputs.report_url
      run: |
        echo "::notice title=Test Report Published::View results at: ${{ steps.playwright-tests.outputs.report_url }}"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: samples/playwright-tests/playwright-report/
        retention-days: 30
