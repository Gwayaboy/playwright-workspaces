name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PLAYWRIGHT_SERVICE_URL: wss://westeurope.api.playwright.microsoft.com/playwrightworkspaces/323c32d5-6298-41b8-be9b-dcd09ef5a8f9/browsers

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: samples/playwright-tests/package-lock.json

    - name: Install dependencies
      working-directory: samples/playwright-tests
      run: npm ci

    - name: Azure Login with Managed Identity
      uses: azure/login@v2
      with:
        client-id: f85dd041-973c-436d-8fcd-5d968862a630
        tenant-id: 16b3c013-d300-468d-ac64-7eda0820b6d3
        subscription-id: 518d3b64-280a-4d38-8b93-ea7404fe5ea1

    - name: Run Playwright tests
      working-directory: samples/playwright-tests
      run: npx playwright test --config=playwright.service.config.ts --workers=20

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: samples/playwright-tests/playwright-report/
        retention-days: 30
